app = "phondo-voice"
primary_region = "syd"

[env]
  PORT = "3001"
  LLM_PROVIDER = "openai"
  NODE_ENV = "production"

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    interval = "15s"
    timeout = "10s"
    grace_period = "10s"
    method = "GET"
    path = "/health"
    protocol = "http"

[[vm]]
  size = "performance-1x"
  memory = "2gb"
