app = "phondo-voice"
primary_region = "syd"

[env]
  PORT = "3001"
  LLM_PROVIDER = "openai"
  NODE_ENV = "production"

[http_service]
  internal_port = 3001
  force_https = true
  # Keep one machine warm at all times for the demo (no cold-start lag on the
  # first call). Revert to auto_stop_machines = 'stop' + min_machines_running = 0
  # to re-enable scale-to-zero once demo traffic is over.
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    interval = "15s"
    timeout = "10s"
    grace_period = "30s"   # 30s startup buffer — prevents transient warn/error during deploys
    method = "GET"
    path = "/health"
    protocol = "http"

[[vm]]
  size = "performance-1x"
  memory = "2gb"
